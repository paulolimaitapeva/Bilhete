<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadgeMaster Pro - SESI</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="no-print">
        <div class="max-w-6xl flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div
                    style="width: 48px; height: 40px; background: #0f172a; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white;">
                    <span style="font-weight: 900; font-style: italic; font-size: 1.25rem;">S</span>
                </div>
                <div>
                    <h1 style="font-size: 1.25rem; font-weight: 700; margin: 0;">BadgeMaster <span
                            style="color: #E30613; font-weight: 900;">SESI</span></h1>
                    <p
                        style="font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin: 0;">
                        Gestão de Identidade Escolar</p>
                </div>
            </div>

            <div id="header-actions" class="hidden">
                <button id="header-export-btn" class="btn btn-primary">
                    Exportar PDF (A4)
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl" style="padding: 2rem 1rem;">

        <!-- Tabs Navigation -->
        <div class="tabs no-print flex">
            <button class="tab-btn active" data-tab="upload">1. Importar</button>
            <button class="tab-btn" data-tab="review" disabled>2. Revisar</button>
            <button class="tab-btn" data-tab="preview" disabled>3. Visualizar</button>
        </div>

        <!-- Section: Upload -->
        <div id="section-upload" class="upload-zone no-print">
            <h2
                style="font-size: 2rem; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 1rem;">
                Gerador de Crachás SESI</h2>
            <p style="color: #64748b; margin-bottom: 2.5rem;">Carregue sua planilha Excel para gerar identificações
                profissionais.</p>
            <label class="upload-label">
                SELECIONAR EXCEL (.XLSX)
                <input type="file" id="file-input" accept=".xlsx, .xls" hidden>
            </label>
        </div>

        <!-- Section: Review -->
        <div id="section-review" class="hidden no-print">
            <div class="flex justify-between items-center" style="margin-bottom: 1.5rem;">
                <h2 style="font-weight: 800; color: #1e293b;">Conferência de Dados</h2>
                <div class="flex gap-4">
                    <button id="btn-clear"
                        style="background: none; border: none; color: #94a3b8; font-weight: 800; font-size: 0.75rem; cursor: pointer; text-transform: uppercase;">Limpar</button>
                    <button id="btn-preview-from-review" class="btn btn-primary" style="font-size: 0.75rem;">Visualizar
                        Crachás</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome Completo</th>
                            <th>RM</th>
                            <th>Série</th>
                            <th>E-mail</th>
                        </tr>
                    </thead>
                    <tbody id="review-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Section: Preview -->
        <div id="section-preview" class="hidden">
            <div class="no-print flex justify-between items-center" style="margin-bottom: 2.5rem;">
                <div>
                    <h2 style="font-size: 1.5rem; font-weight: 900;">Prévia de Impressão</h2>
                    <p style="color: #64748b;">Confira o layout antes de gerar o documento final.</p>
                </div>
                <div class="flex gap-4">
                    <button id="btn-print-native" class="btn btn-outline">
                        IMPRIMIR NO NAVEGADOR
                    </button>
                    <button id="export-pdf-btn" class="btn btn-primary">
                        BAIXAR PDF
                    </button>
                </div>
            </div>

            <div id="badges-to-print" style="background: white; border-radius: 1rem; padding: 2rem 0;">
                <!-- Cards will be injected here -->
            </div>
        </div>

    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden"
        style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div
            style="background: white; padding: 3rem; border-radius: 2rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
            <div
                style="width: 4rem; height: 4rem; border: 4px solid #E30613; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem;">
            </div>
            <p id="loading-text"
                style="font-weight: 900; font-size: 1.25rem; text-transform: uppercase; font-style: italic; margin: 0;">
                Processando...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script type="module" src="main.js"></script>
</body>

</html>
